# Прокси с SSL для autosectest.ru
# HTTP — редирект на HTTPS и ACME challenge для Let's Encrypt
server {
    listen 80;
    server_name autosectest.ru www.autosectest.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — проксирование на frontend
server {
    listen 443 ssl http2;
    server_name autosectest.ru www.autosectest.ru;

    ssl_certificate     /etc/letsencrypt/live/autosectest.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autosectest.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Заголовки для прокси
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location / {
        proxy_pass http://frontend:80;
    }
}
