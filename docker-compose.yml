version: '3.8'

services:
  intelligence-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/intelligence_db
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    cap_add:
      - NET_RAW
    privileged: true
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: intelligence_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: